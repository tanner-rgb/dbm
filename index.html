  .pay-toggle button { padding: 11px; border: none; background: white; font-size: 14px; font-weight: 600; color: var(--gray); cursor: pointer; transition: all 0.15s; }

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getUnit(scope) {
  if (!scope) return null;
  if (scope === "Brick") return "Cubes";
  if (SF_SCOPES.has(scope)) return "SF";
  if (LF_SCOPES.has(scope)) return "LF";
  return "EA";
}

function calcScopePay(scope, qty, mult, category, bpc) {
  if (!scope || parseFloat(qty) <= 0 || qty === "") return 0;
  const key = `${category} ${scope}`;
  const rate = UNIT_RATES[key] || 0;
  const unit = getUnit(scope);
  const numQty = parseFloat(qty) || 0;
  const payQty = unit === "Cubes" ? numQty * (parseFloat(bpc) || 500) : numQty;
  const base = payQty * rate;
  const mFactor = MULTIPLIER_RATES[mult] || 1;
  return base * mFactor;
}

function calcDetailPay(cat, type, qty) {
  if (!cat || !type) return 0;
  const items = DETAIL_TREE[cat] || [];
  const item = items.find(i => i.type === type);
  if (!item || item.rate === null) return null; // null = TBD / custom rate
  return item.rate * (parseInt(qty) || 1);
}

function fmtDetailPay(cat, type, qty) {
  const val = calcDetailPay(cat, type, qty);
  if (val === null) return "TBD";
  return fmt(val);
}

function calcCleanPay(cleanType) {
  return CLEAN_RATES_MAP[cleanType] || 0;
}

// Returns YYYY-MM-DD of the most recent Friday on or before today (local time)
function lastFriday() {
  const d = new Date();
  const dow = d.getDay(); // 0=Sun … 5=Fri … 6=Sat
  const daysBack = dow >= 5 ? dow - 5 : dow + 2;
  d.setDate(d.getDate() - daysBack);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${dd}`;
}

// Snap any date string back to the most recent Friday (local time, never jumps forward)
function snapToFriday(dateStr) {
  if (!dateStr) return lastFriday();
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d); // local midnight
  const dow = dt.getDay();
  if (dow === 5) return dateStr; // already Friday
  const daysBack = dow > 5 ? dow - 5 : dow + 2;
  dt.setDate(dt.getDate() - daysBack);
  const yr = dt.getFullYear();
  const mo = String(dt.getMonth() + 1).padStart(2, "0");
  const dy = String(dt.getDate()).padStart(2, "0");
  return `${yr}-${mo}-${dy}`;
}

// Calculate hourly pay from headcount, hours, and per-person rates
function calcHourlyPay(hours, numLead, numMason, numLabor, leadRate, masonRate, laborRate) {
  const h = parseFloat(hours) || 0;
  const leadPay  = h * (parseInt(numLead)  || 0) * (parseFloat(leadRate)  || 0);
  const masonPay = h * (parseInt(numMason) || 0) * (parseFloat(masonRate) || 0);
  const laborPay = h * (parseInt(numLabor) || 0) * (parseFloat(laborRate) || 0);
  return { leadPay, masonPay, laborPay, total: leadPay + masonPay + laborPay };
}

function fmt(n) {
  const num = parseFloat(n) || 0;
  return "$" + num.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
}

function fmtDate(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
}

function statusColor(s) {
  const map = {pending:"#D97706",sent:"#2563EB",opened:"#7C3AED",approved:"#059669",disputed:"#DC2626",paid:"#16A34A"};
  return map[s] || "#999";
}

function statusBadgeClass(s) {
  const map = {pending:"badge-pending",sent:"badge-sent",approved:"badge-approved",disputed:"badge-disputed",paid:"badge-paid"};
  return "badge " + (map[s] || "badge-pending");
}

// ── API ───────────────────────────────────────────────────────────────────────
// Uses text/plain Content-Type to avoid CORS preflight with Google Apps Script
async function apiSubmit(record) {
  const res = await fetch(API_BASE, {
    method: "POST",
    redirect: "follow",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "submit", record }),
  });
  const data = await res.json();
  if (!data.success) throw new Error(data.error || "Unknown error");
  return data;
}

async function apiGetSubmissions(crew) {
  const qs = new URLSearchParams({action:"submissions", crew}).toString();
  const res = await fetch(API_BASE + "?" + qs, {redirect:"follow"});
  const data = await res.json();
  if (!data.success) throw new Error(data.error || "Unknown error");
  return data.submissions || [];
}

async function apiGetCrews() {
  const qs = new URLSearchParams({action:"crews"}).toString();
  const res = await fetch(API_BASE + "?" + qs, {redirect:"follow"});
  const data = await res.json();
  if (!data.success) throw new Error(data.error || "Unknown error");
  return data.crews || []; // [{displayName, leadRate, masonRate, laborRate}, …]
}


async function apiGetProjects() {
  const qs = new URLSearchParams({action:"projects"}).toString();
  const res = await fetch(API_BASE + "?" + qs, {redirect:"follow"});
  const data = await res.json();
  if (!data.success) throw new Error(data.error || "Unknown error");
  return data.projects || []; // [{name, category, active, bpc}, ...]
}

async function apiTransition(payload) {
  const res = await fetch(API_BASE, {
    method: "POST",
    redirect: "follow",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "transition", ...payload }),
  });
  const data = await res.json();
  if (!data.success) throw new Error(data.error || "Unknown error");
  return data;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function Toast({msg, type, onDone}) {
  useEffect(() => {
    const t = setTimeout(onDone, 2800);
    return () => clearTimeout(t);
  }, [onDone]);
  return <div className={`toast ${type}`}>{msg}</div>;
}

// ── FIELD REPORT FORM ─────────────────────────────────────────────────────────
function FieldReportScreen({onNav, onSubmitDone, lang}) {
  const t = T[lang];

  // ── Week Ending — defaults to last Friday, snaps on change ────────────────
  const [weekEnding, setWeekEnding] = useState(() => lastFriday());
  function handleWeekChange(e) { setWeekEnding(snapToFriday(e.target.value)); }

  // ── Core fields ───────────────────────────────────────────────────────────
  const [project,  setProject]  = useState("");
  const [category, setCategory] = useState("Commercial");
  const [crew,     setCrew]     = useState("");
  const [payType,  setPayType]  = useState("Unit");

  const [scopeA,  setScopeA]  = useState("");
  const [cubesA,  setCubesA]  = useState("");
  const [bpcA,    setBpcA]    = useState("500");
  const [multA,   setMultA]   = useState("None");

  const [showScopeB, setShowScopeB] = useState(false);
  const [scopeB,  setScopeB]  = useState("");
  const [cubesB,  setCubesB]  = useState("");
  const [bpcB,    setBpcB]    = useState("500");
  const [multB,   setMultB]   = useState("None");

  const [details,   setDetails]   = useState([]);
  const [cleanType, setCleanType] = useState("None");

  const [hours,    setHours]    = useState("");
  const [numLead,  setNumLead]  = useState("0");
  const [numMason, setNumMason] = useState("0");
  const [numLabor, setNumLabor] = useState("0");

  const [photos,     setPhotos]     = useState([]);
  const [submitting, setSubmitting] = useState(false);
  const [toast,      setToast]      = useState(null);

  // ── Project → auto-sets category (declared after all setters are in scope) ─
  function handleProjectChange(name) {
    setProject(name);
    setScopeA(""); setScopeB(""); setShowScopeB(false);
    const cat = getProjectCategory(name);
    if (cat) setCategory(cat);
  }

  // ── Reset all form fields ─────────────────────────────────────────────────
  function resetForm() {
    setWeekEnding(lastFriday());
    setProject(""); setCategory("Commercial"); setCrew(""); setPayType("Unit");
    setScopeA(""); setCubesA(""); setBpcA("500"); setMultA("None");
    setShowScopeB(false); setScopeB(""); setCubesB(""); setBpcB("500"); setMultB("None");
    setDetails([]); setCleanType("None");
    setHours(""); setNumLead("0"); setNumMason("0"); setNumLabor("0");
    setPhotos([]);
  }

  // ── Crew hourly rates (fetched once on mount) ─────────────────────────────
  const [crewRates, setCrewRates] = useState([]);
  const [crewRatesLoading, setCrewRatesLoading] = useState(true);
  useEffect(() => {
    apiGetCrews()
      .then(setCrewRates)
      .catch(() => {})
      .finally(() => setCrewRatesLoading(false));
  }, []);

  const [projectList, setProjectList] = useState([]);
  const [projectsLoading, setProjectsLoading] = useState(true);
  useEffect(() => {
    apiGetProjects()
      .then(list => setProjectList(list.filter(p => p.active)))
      .catch(() => {})
      .finally(() => setProjectsLoading(false));
  }, []);
  function getProjectCategory(name) {
    const p = projectList.find(x => x.name === name);
    return p ? p.category : null;
  }
  const selectedRates = crewRates.find(r => r.displayName === crew) || {};
  const leadRate  = selectedRates.leadRate  || 0;
  const masonRate = selectedRates.masonRate || 0;
  const laborRate = selectedRates.laborRate || 0;
  const hourlyCalc = calcHourlyPay(hours, numLead, numMason, numLabor, leadRate, masonRate, laborRate);

  function handlePhotoAdd(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        setPhotos(p => [...p, { url: ev.target.result, name: file.name }]);
      };
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  }

  function removePhoto(idx) {
    setPhotos(p => p.filter((_, i) => i !== idx));
  }

  const scopes = category === "Commercial" ? COMMERCIAL_SCOPES : RESIDENTIAL_SCOPES;

  const payA = calcScopePay(scopeA, cubesA, multA, category, bpcA);
  const payB = showScopeB ? calcScopePay(scopeB, cubesB, multB, category, bpcB) : 0;
  const detailTotal = details.reduce((s, d) => s + (calcDetailPay(d.cat, d.type, d.qty) || 0), 0);
  const cleanPay = calcCleanPay(cleanType);
  const grandTotal = payType === "Unit"
    ? payA + payB + detailTotal + cleanPay
    : hourlyCalc.total;

  function addDetail() {
    setDetails(d => [...d, {id: Date.now(), cat:"", type:"", qty:"1"}]);
  }
  function removeDetail(id) {
    setDetails(d => d.filter(x => x.id !== id));
  }
  function updateDetail(id, field, val) {
    setDetails(d => d.map(x => {
      if (x.id !== id) return x;
      if (field === "cat") return {...x, cat:val, type:""};
      return {...x, [field]:val};
    }));
  }

  function getUnitLabel(scope) {
    const u = getUnit(scope);
    if (u === "Cubes") return t.cubes;
    return u || t.qty;
  }

  async function handleSubmit() {
    if (!project || !crew || !weekEnding) {
      setToast({msg:"Please fill in Project, Crew, and Week Ending", type:"error"});
      return;
    }
    if (payType === "Unit" && !scopeA) {
      setToast({msg:"Please select at least Scope A", type:"error"});
      return;
    }
    if (payType === "Hourly") {
      if (!hours || parseFloat(hours) <= 0) {
        setToast({msg:"Please enter hours worked", type:"error"});
        return;
      }
      const totalWorkers = (parseInt(numLead)||0) + (parseInt(numMason)||0) + (parseInt(numLabor)||0);
      if (totalWorkers === 0) {
        setToast({msg:"Please enter at least one worker (Lead, Mason, or Labor)", type:"error"});
        return;
      }
    }

    setSubmitting(true);
    try {
      const record = {
        weekEnding,
        project,
        projectDisplay: project,
        crew,
        crewDisplay: crew,
        category,
        payType,
        scopeA,
        cubesA: parseFloat(cubesA) || 0,
        bpcA: parseFloat(bpcA) || 500,
        multA,
        payA,
        scopeB: showScopeB ? scopeB : "",
        cubesB: showScopeB ? parseFloat(cubesB) || 0 : 0,
        bpcB: parseFloat(bpcB) || 500,
        multB: showScopeB ? multB : "None",
        payB: showScopeB ? payB : 0,
        details: details.map(d => ({cat:d.cat, type:d.type, qty:parseInt(d.qty)||1})),
        cleanType,
        cleanPay,
        hours: parseFloat(hours) || 0,
        numLead: parseInt(numLead) || 0,
        numMason: parseInt(numMason) || 0,
        numLabor: parseInt(numLabor) || 0,
        leadRate, masonRate, laborRate,
        totalPay: grandTotal,
        photos,
      };
      await apiSubmit(record);
      setToast({msg:t.successMsg, type:"success"});
      onSubmitDone && onSubmitDone();
      setTimeout(() => { resetForm(); onNav("screen","suite"); }, 1500);
    } catch(e) {
      setToast({msg:t.errorMsg + " (" + e.message + ")", type:"error"});
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <div className="screen">
      <div className="header">
        <button className="back-btn" onClick={() => onNav("screen","suite")}>←</button>
        <DBMLogo />
        <div>
          <div style={{fontSize:17,fontWeight:700,color:"white"}}>{t.fieldReport}</div>
          <div className="header-sub">DBM Operations</div>
        </div>
        <div className="header-right">
          <button className={`lang-btn${lang==="en"?" active":""}`} onClick={() => onNav("lang","en")}>EN</button>
          <button className={`lang-btn${lang==="es"?" active":""}`} onClick={() => onNav("lang","es")}>ES</button>
        </div>
      </div>

      <div className="content" style={{paddingBottom:100}}>
        <div className="card">
          <div className="card-title">Job Info</div>
          <div className="field">
            <label>{t.weekEnding} <span style={{fontSize:10,color:"var(--amber)",fontWeight:700,textTransform:"none",letterSpacing:0}}>— Fridays only</span></label>
            <input type="date" value={weekEnding} onChange={handleWeekChange} />
            <div style={{fontSize:11,color:"var(--gray)",marginTop:4}}>
              Date auto-snaps to Friday if another day is selected.
            </div>
          </div>
          <div className="field">
            <label>{t.project}</label>
            <div className="select-wrap">
              <select value={project} onChange={e => handleProjectChange(e.target.value)}>
                <option value="">— Select —</option>
                {projectsLoading
                    ? <option>Loading…</option>
                    : projectList.map(p => <option key={p.name} value={p.name}>{p.name}</option>)}
              </select>
            </div>
          </div>
          <div className="field">
            <label>{t.crew}</label>
            <div className="select-wrap">
              <select value={crew} onChange={e => setCrew(e.target.value)}>
                <option value="">— Select —</option>
                {CREWS.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div className="field" style={{marginBottom:0}}>
            <label>{t.category}</label>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#f8f8f8",borderRadius:9,border:"1.5px solid var(--border)"}}>
              <span style={{fontSize:18}}>{category === "Commercial" ? "🏗" : "🏠"}</span>
              <span style={{fontWeight:700,fontSize:15}}>{category === "Commercial" ? t.commercial : t.residential}</span>
              <span style={{marginLeft:"auto",fontSize:10,color:"var(--gray)",background:"#e8e8e8",padding:"2px 7px",borderRadius:4,fontWeight:600}}>
                {project ? "AUTO" : "DEFAULT"}
              </span>
            </div>
            {project && <div style={{fontSize:11,color:"var(--gray)",marginTop:4}}>Set automatically from project selection.</div>}
          </div>
        </div>

        <div className="card">
          <div className="card-title">{t.payType}</div>
          <div className="pay-toggle">
            <button className={payType==="Unit"?"active":""} onClick={() => setPayType("Unit")}>📐 {t.unit}</button>
            <button className={payType==="Hourly"?"active":""} onClick={() => setPayType("Hourly")}>⏱ {t.hourly}</button>
          </div>

          {payType === "Unit" && (
            <>
              <div className="scope-row">
                <div className="scope-row-header">
                  <span className="scope-label">{t.scopeA}</span>
                  {payA > 0 && <span className="scope-pay">{fmt(payA)}</span>}
                </div>
                <div className="field" style={{marginBottom:8}}>
                  <div className="select-wrap">
                    <select value={scopeA} onChange={e => setScopeA(e.target.value)}>
                      <option value="">— Scope —</option>
                      {scopes.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                </div>
                {scopeA && (
                  <div className="field-row">
                    <div className="field" style={{marginBottom:0}}>
                      <label>{getUnitLabel(scopeA)}</label>
                      <input type="number" inputMode="decimal" min="0" placeholder="0" value={cubesA} onChange={e => setCubesA(e.target.value)} />
                    </div>
                    {getUnit(scopeA) === "Cubes" && (
                      <div className="field" style={{marginBottom:0}}>
                        <label>{t.bpc}</label>
                        <input type="number" inputMode="decimal" min="1" placeholder="500" value={bpcA} onChange={e => setBpcA(e.target.value)} />

                    )}

                {scopeA && (
                  <div className="field" style={{marginTop:8,marginBottom:0}}>
                    <label>{t.multiplier}</label>
                    <div className="select-wrap">
                      <select value={multA} onChange={e => setMultA(e.target.value)}>
                        {Object.keys(MULTIPLIER_RATES).map(m => <option key={m} value={m}>{m}</option>)}
                      </select>
                    </div>
                  </div>
                )}
              </div>

              {!showScopeB ? (
                <button className="add-btn" onClick={() => setShowScopeB(true)}>+ {t.addScopeB}</button>

                <div className="scope-row">
                  <div className="scope-row-header">

                        <input type="number" inputMode="decimal" min="0" placeholder="0" value={cubesB} onChange={e => setCubesB(e.target.value)} />
                      </div>
                      {getUnit(scopeB) === "Cubes" && (
                        <div className="field" style={{marginBottom:0}}>
                          <label>{t.bpc}</label>
                          <input type="number" inputMode="decimal" min="1" placeholder="500" value={bpcB} onChange={e => setBpcB(e.target.value)} />
                        </div>
                      )}
                    </div>
                  )}
                  {scopeB && (
                    <div className="field" style={{marginTop:8,marginBottom:0}}>
                      <label>{t.multiplier}</label>
                      <div className="select-wrap">
                        <select value={multB} onChange={e => setMultB(e.target.value)}>
                          {Object.keys(MULTIPLIER_RATES).map(m => <option key={m} value={m}>{m}</option>)}
                        </select>
                      </div>

                  )}

              )}

              {details.length > 0 && (
                <div className="card" style={{background:"#f8f8f8",boxShadow:"none",border:"1px solid #e8e8e8",marginBottom:10}}>
                  <div className="card-title">{t.details}</div>
                  {details.map(d => (
                    <div key={d.id} className="scope-row" style={{marginBottom:8}}>
                      <div className="scope-row-header">
                        <span className="scope-label">{d.cat || t.details}</span>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          {d.cat && d.type && (
                            calcDetailPay(d.cat,d.type,d.qty) === null
                              ? <span className="scope-pay" style={{fontSize:12,color:"var(--amber)"}}>TBD</span>
                              : calcDetailPay(d.cat,d.type,d.qty) > 0
                                ? <span className="scope-pay">{fmtDetailPay(d.cat,d.type,d.qty)}</span>

                          <button className="remove-btn" onClick={() => removeDetail(d.id)}>✕</button>

                      </div>
                      <div className="field" style={{marginBottom:8}}>
                        <label>{t.detailCat}</label>
                        <div className="select-wrap">
                          <select value={d.cat} onChange={e => updateDetail(d.id,"cat",e.target.value)}>
                            <option value="">— Category —</option>
                            {DETAIL_CATS.map(c => <option key={c} value={c}>{c}</option>)}
                          </select>
                        </div>
                      </div>
                      {d.cat && (
                        <div className="field-row">
                          <div className="field" style={{marginBottom:0}}>
                            <label>{t.detailType}</label>
                            <div className="select-wrap">
                              <select value={d.type} onChange={e => updateDetail(d.id,"type",e.target.value)}>
                                <option value="">— Type —</option>
                                {(DETAIL_TREE[d.cat]||[]).map(i => <option key={i.type} value={i.type}>{i.type}</option>)}
                              </select>
                            </div>
                          </div>
                          <div className="field" style={{marginBottom:0}}>
                            <label>{t.count}</label>
                            <input type="number" inputMode="numeric" min="1" placeholder="1" value={d.qty} onChange={e => updateDetail(d.id,"qty",e.target.value)} />

                  <label>{t.numLead}</label>
                  <input type="number" inputMode="numeric" min="0" placeholder="0" value={numLead} onChange={e => setNumLead(e.target.value)} />
                </div>
                <div className="field" style={{marginBottom:0}}>
                  <label>{t.numMason}</label>
                  <input type="number" inputMode="numeric" min="0" placeholder="0" value={numMason} onChange={e => setNumMason(e.target.value)} />
                </div>
                <div className="field" style={{marginBottom:0}}>
                  <label>{t.numLabor}</label>
                  <input type="number" inputMode="numeric" min="0" placeholder="0" value={numLabor} onChange={e => setNumLabor(e.target.value)} />
                </div>
              </div>

              {crew && (
                <div style={{marginTop:12,background:"#f0fdf4",borderRadius:9,padding:"10px 14px",border:"1px solid #bbf7d0"}}>
                  {crewRatesLoading ? (
                    <div style={{fontSize:12,color:"#065f46"}}>Loading rates...</div>

                    <div style={{fontSize:12,color:"#92400e"}}>⚠️ No hourly rates on file for this crew.</div>

                    <>
                      <div style={{fontSize:11,color:"#065f46",marginBottom:6,display:"flex",gap:12}}>
                        {leadRate  > 0 && <span>Lead: {fmt(leadRate)}/hr</span>}
                        {masonRate > 0 && <span>Mason: {fmt(masonRate)}/hr</span>}
                        {laborRate > 0 && <span>Labor: {fmt(laborRate)}/hr</span>}
                      </div>
                      {hourlyCalc.leadPay  > 0 && <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#065f46",padding:"2px 0"}}><span>{numLead} Lead × {hours}h × {fmt(leadRate)}</span><span>{fmt(hourlyCalc.leadPay)}</span></div>}
                      {hourlyCalc.masonPay > 0 && <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#065f46",padding:"2px 0"}}><span>{numMason} Mason × {hours}h × {fmt(masonRate)}</span><span>{fmt(hourlyCalc.masonPay)}</span></div>}
                      {hourlyCalc.laborPay > 0 && <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#065f46",padding:"2px 0"}}><span>{numLabor} Labor × {hours}h × {fmt(laborRate)}</span><span>{fmt(hourlyCalc.laborPay)}</span></div>}
                      {hourlyCalc.total > 0 && (
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:800,color:"#065f46",paddingTop:8,marginTop:6,borderTop:"1px solid #86efac"}}>
                          <span>Estimated Total</span><span>{fmt(hourlyCalc.total)}</span>
                        </div>
                      )}
                    </>
                  )}
                </div>
              )}
            </>
          )}
        </div>

        {/* Photos */}
        <div className="card">
          <div className="card-title">📷 Photos</div>
          {photos.length > 0 && (
            <div className="photo-grid">
              {photos.map((p, i) => (
                <div key={i} className="photo-thumb">
                  <img src={p.url} alt={p.name} />
                  <button className="photo-thumb-remove" onClick={() => removePhoto(i)}>✕</button>
                </div>
              ))}
            </div>
          )}
          <label className="photo-upload-btn">
            📷 {photos.length === 0 ? "Add Photos" : "Add More Photos"}
            <input
              type="file"
              accept="image/*"
              multiple
              style={{display:"none"}}
              onChange={handlePhotoAdd}
            />
          </label>
          {photos.length > 0 && (
            <div style={{fontSize:12,color:"var(--gray)",marginTop:6,textAlign:"center"}}>
              {photos.length} photo{photos.length !== 1 ? "s" : ""} selected
            </div>
          )}
        </div>

        <button className="btn btn-green" onClick={handleSubmit} disabled={submitting}>
          {submitting ? t.submitting : t.submit}
        </button>
      </div>

      <div className="pay-bar">
        <div>
          <div className="pay-bar-label">{t.estPay}</div>
          <div className="pay-bar-amount">{fmt(grandTotal)}</div>
        </div>
        {grandTotal > 0 && payType === "Unit" && (
          <div style={{fontSize:11,color:"#aaa",textAlign:"right",maxWidth:200}}>
            {payA > 0 && <div>Scope A: {fmt(payA)}</div>}
            {payB > 0 && <div>Scope B: {fmt(payB)}</div>}
            {detailTotal > 0 && <div>Details: {fmt(detailTotal)}</div>}
            {cleanPay > 0 && <div>Clean: {fmt(cleanPay)}</div>}
          </div>
        )}
        {grandTotal > 0 && payType === "Hourly" && (
          <div style={{fontSize:11,color:"#aaa",textAlign:"right",maxWidth:200}}>
            {hourlyCalc.leadPay  > 0 && <div>Lead: {fmt(hourlyCalc.leadPay)}</div>}
            {hourlyCalc.masonPay > 0 && <div>Mason: {fmt(hourlyCalc.masonPay)}</div>}
            {hourlyCalc.laborPay > 0 && <div>Labor: {fmt(hourlyCalc.laborPay)}</div>}
          </div>
        )}
      </div>

      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

// ── MY SUBMISSIONS ────────────────────────────────────────────────────────────
function SubmissionsScreen({onNav, lang, crew}) {
  const t = T[lang];
  const [allSubs, setAllSubs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [viewStub, setViewStub] = useState(null);
  const [filterCrew, setFilterCrew] = useState(crew || "");
  const [filterWeek, setFilterWeek] = useState("");

  async function load() {
    setLoading(true);
    try {
      // Load all subs; filter client-side so both dropdowns work together
      const data = await apiGetSubmissions("");
      setAllSubs(data);
    } catch(e) {
      setAllSubs([]);
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { load(); }, []);

  // Build unique sorted week options from loaded data
  const weekOptions = [...new Set(allSubs.map(s => s.weekEnding).filter(Boolean))].sort().reverse();

  // Apply filters client-side
  const subs = allSubs.filter(s => {
    if (filterCrew && (s.crew || s.crewDisplay) !== filterCrew) return false;
    if (filterWeek && s.weekEnding !== filterWeek) return false;
    return true;
  });

  if (viewStub) {
    const s = viewStub;
    return (
      <div className="screen">
        <div className="header">
          <button className="back-btn" onClick={() => setViewStub(null)}>←</button>
          <div style={{fontSize:17,fontWeight:700,color:"white"}}>{t.payBreakdown}</div>
        </div>
        <div className="content">
          <div className="card">
            <div className="info-row"><span className="info-label">{t.project}</span><span className="info-value">{s.project || s.projectDisplay}</span></div>
            <div className="info-row"><span className="info-label">{t.crew}</span><span className="info-value">{s.crew || s.crewDisplay}</span></div>
            <div className="info-row"><span className="info-label">{t.weekEnding}</span><span className="info-value">{fmtDate(s.weekEnding)}</span></div>
            <div className="info-row"><span className="info-label">{t.status}</span><span className={statusBadgeClass(s.status || s.stubStatus)}>{(s.status || s.stubStatus || "pending").toUpperCase()}</span></div>
          </div>
          {s.ownerNote && (
            <div className="dispute-note">
              <strong>⚠️ Owner Note:</strong> {s.ownerNote}
            </div>
          )}
          <div className="card">
            <div className="card-title">{t.payBreakdown}</div>
            {s.scopeA && <div className="stub-line"><span>Scope A: {s.scopeA}</span><span>{fmt(s.payA||0)}</span></div>}
            {s.scopeB && <div className="stub-line"><span>Scope B: {s.scopeB}</span><span>{fmt(s.payB||0)}</span></div>}
            {(s.details||[]).map((d,i) => (
              <div key={i} className="stub-line"><span>{d.cat}: {d.type} ×{d.qty}</span><span>{fmtDetailPay(d.cat,d.type,d.qty)}</span></div>
            ))}
            {s.cleanType && s.cleanType !== "None" && <div className="stub-line"><span>{s.cleanType}</span><span>{fmt(s.cleanPay||0)}</span></div>}
            {s.payType === "Hourly" && <div className="stub-line"><span>Hourly ({s.hours}h)</span><span>{fmt(s.totalPay||0)}</span></div>}
            <div className="section-divider"/>
            <div className="stub-total"><span>{t.totalPay}</span><span style={{color:"var(--green)"}}>{fmt(s.totalPay||0)}</span></div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="screen">
      <div className="header">
        <button className="back-btn" onClick={() => onNav("screen","suite")}>←</button>
        <DBMLogo />
        <div>
          <div style={{fontSize:17,fontWeight:700,color:"white"}}>{t.mySubmissions}</div>
          <div className="header-sub">DBM Operations</div>
        </div>
      </div>
      <div className="content">

        {/* Filter card */}
        <div className="card" style={{marginBottom:12}}>
          <div className="card-title" style={{marginBottom:10}}>Filter</div>
          <div className="field" style={{marginBottom:10}}>
            <label>{t.crew}</label>
            <div className="select-wrap">
              <select value={filterCrew} onChange={e => setFilterCrew(e.target.value)}>
                <option value="">— All Crews —</option>
                {CREWS.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div className="field" style={{marginBottom:0}}>
            <label>{t.weekEnding}</label>
            <div className="select-wrap">
              <select value={filterWeek} onChange={e => setFilterWeek(e.target.value)}>
                <option value="">— All Weeks —</option>
                {weekOptions.map(w => <option key={w} value={w}>{fmtDate(w)}</option>)}
              </select>
            </div>
          </div>
          {(filterCrew || filterWeek) && (
            <button
              className="btn btn-outline btn-sm"
              style={{marginTop:10,width:"100%"}}
              onClick={() => { setFilterCrew(""); setFilterWeek(""); }}
            >
              ✕ Clear Filters
            </button>
          )}
        </div>

        {loading ? (
          <div className="loading"><div className="spinner"/><p>Loading...</p></div>
        ) : subs.length === 0 && allSubs.length === 0 ? (
          <div className="empty"><div className="empty-icon">📭</div><p>{t.noSubmissions}</p></div>
        ) : subs.length === 0 ? (
          <div className="empty"><div className="empty-icon">🔍</div><p>No submissions match your filters.</p></div>
        ) : (
          subs.map((s,i) => (
            <div key={i} className="sub-card">
              <div className="sub-card-stripe" style={{background:statusColor(s.status || s.stubStatus)}}/>
              <div className="sub-card-body">
                <div className="sub-card-top">
                  <div className="sub-card-project">{s.project || s.projectDisplay}</div>
                  <div className="sub-card-amount">{fmt(parseFloat(s.totalPay)||0)}</div>
                </div>
                <div className="sub-card-meta">{s.crew || s.crewDisplay} • {fmtDate(s.weekEnding)} • {s.payType || ""}</div>
                <div style={{marginBottom:8}}><span className={statusBadgeClass(s.status || s.stubStatus)}>{(s.status || s.stubStatus || "pending").toUpperCase()}</span></div>
                {(s.status === "disputed" || s.stubStatus === "disputed") && s.ownerNote && (
                  <div className="dispute-note" style={{marginBottom:10}}>
                    <strong>⚠️ Disputed:</strong> {s.ownerNote}
                  </div>
                )}
                <div className="sub-card-actions">
                  <button className="btn btn-outline btn-sm" onClick={() => setViewStub(s)}>{t.viewStub}</button>
                </div>
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// ── OWNER DASHBOARD ───────────────────────────────────────────────────────────
function OwnerScreen({onNav, lang}) {
  const t = T[lang];
  const [subs, setSubs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [disputeFor, setDisputeFor] = useState(null);
  const [disputeNote, setDisputeNote] = useState("");

  async function load() {
    setLoading(true);
    try {
      const data = await apiGetSubmissions("");
      setSubs(data);
    } catch(e) { setSubs([]); }
    finally { setLoading(false); }
  }

  useEffect(() => { load(); }, []);

  async function transition(s, newStatus, ownerNote="") {
    try {
      await apiTransition({
        crewDisplay: s.crewDisplay || s.crew,
        weekEnding: s.weekEnding,
        newStatus,
        ownerNote,
      });
      setToast({msg:`Marked ${newStatus}`, type:"success"});
      setDisputeFor(null);
      setDisputeNote("");
      load();
    } catch(e) {
      setToast({msg:"Action failed: " + e.message, type:"error"});
    }
  }

  const pending  = subs.filter(s => ["pending","sent","opened"].includes(s.status || s.stubStatus));
  const disputed = subs.filter(s => (s.status || s.stubStatus) === "disputed");
  const thisWeek = lastFriday();
  const weekTotal = subs
    .filter(s => s.weekEnding === thisWeek)
    .reduce((a,s) => a + (parseFloat(s.totalPay)||0), 0);

  return (
    <div className="screen">
      <div className="header">
        <button className="back-btn" onClick={() => onNav("screen","suite")}>←</button>
        <DBMLogo />
        <div>
          <div style={{fontSize:17,fontWeight:700,color:"white"}}>{t.ownerDash}</div>
          <div className="header-sub">Tanner · DBM</div>
        </div>
      </div>
      <div className="content">

        {/* Inline dispute sheet — slides up from bottom */}
        {disputeFor && (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
            <div style={{background:"white",borderRadius:"16px 16px 0 0",padding:20,width:"100%",maxWidth:480,margin:"0 auto"}}>
              <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>Dispute Reason</div>
              <div style={{fontSize:13,color:"var(--gray)",marginBottom:12}}>
                {disputeFor.crewDisplay || disputeFor.crew} — {fmtDate(disputeFor.weekEnding)}
              </div>
              <textarea
                value={disputeNote}
                onChange={e => setDisputeNote(e.target.value)}
                placeholder="Describe the issue..."
                rows={3}
                style={{width:"100%",padding:"10px 14px",border:"1.5px solid var(--border)",borderRadius:9,fontSize:15,resize:"none",outline:"none",marginBottom:12,fontFamily:"inherit"}}
              />
              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-outline" style={{flex:1}} onClick={() => { setDisputeFor(null); setDisputeNote(""); }}>Cancel</button>
                <button
                  className="btn btn-red"
                  style={{flex:1,opacity:disputeNote.trim()?1:0.5}}
                  disabled={!disputeNote.trim()}
                  onClick={() => transition(disputeFor, "disputed", disputeNote.trim())}
                >
                  Confirm Dispute
                </button>
              </div>
            </div>
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
          {[
            {label:`Week of ${fmtDate(thisWeek)}`, val:fmt(weekTotal),  color:"var(--green)"},
            {label:"Pending Review", val:pending.length,  color:"var(--amber)"},
            {label:"Disputed",       val:disputed.length, color:"var(--red)"},
          ].map(s => (
            <div key={s.label} className="card" style={{textAlign:"center",padding:"12px 8px",marginBottom:0}}>
              <div style={{fontSize:18,fontWeight:800,color:s.color}}>{s.val}</div>
              <div style={{fontSize:10,color:"var(--gray)",marginTop:2,lineHeight:1.2}}>{s.label}</div>
            </div>
          ))}
        </div>

        {loading ? (
          <div className="loading"><div className="spinner"/></div>
        ) : subs.length === 0 ? (
          <div className="empty"><div className="empty-icon">📭</div><p>No submissions yet</p></div>
        ) : (
          subs.map((s,i) => {
            const status = s.status || s.stubStatus || "pending";
            return (
              <div key={i} className="sub-card">
                <div className="sub-card-stripe" style={{background:statusColor(status)}}/>
                <div className="sub-card-body">
                  <div className="sub-card-top">
                    <div className="sub-card-project">{s.crewDisplay || s.crew}</div>
                    <div className="sub-card-amount">{fmt(parseFloat(s.totalPay)||0)}</div>
                  </div>
                  <div className="sub-card-meta">{s.projectDisplay || s.project} • {fmtDate(s.weekEnding)}</div>
                  <div style={{marginBottom:10}}><span className={statusBadgeClass(status)}>{status.toUpperCase()}</span></div>
                  {(status === "disputed") && s.ownerNote && (
                    <div className="dispute-note" style={{marginBottom:10}}>
                      <strong>⚠️ Disputed:</strong> {s.ownerNote}
                    </div>
                  )}
                  {status === "pending" && (
                    <div className="sub-card-actions">
                      <button className="btn btn-green btn-sm" onClick={() => transition(s,"approved")}>✓ Approve</button>
                      <button className="btn btn-red btn-sm" onClick={() => { setDisputeFor(s); setDisputeNote(""); }}>✗ Dispute</button>
                    </div>
                  )}
                  {status === "approved" && (
                    <div className="sub-card-actions">
                      <button className="btn btn-blue btn-sm" onClick={() => transition(s,"paid")}>💰 Mark Paid</button>
                    </div>
                  )}
                </div>
              </div>
            );
          })
        )}
      </div>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("suite");
  const [lang, setLang] = useState("en");
  const [submissions, setSubmissions] = useState([]);

  // Load submissions once so the suite badge shows disputed count
  useEffect(() => {
    apiGetSubmissions("").then(setSubmissions).catch(() => {});
  }, []);

  // Reload after a field report is submitted so badge refreshes
  function onSubmitDone() {
    apiGetSubmissions("").then(setSubmissions).catch(() => {});
  }

  function onNav(type, val) {
    if (type === "screen") {
      setScreen(val);
      // Refresh badge whenever we return to suite
      if (val === "suite") {
        apiGetSubmissions("").then(setSubmissions).catch(() => {});
      }
    }
    if (type === "lang") setLang(val);
  }

  const props = {onNav, lang, submissions};

  if (screen === "suite")  return <SuiteLauncher {...props} />;
  if (screen === "field")  return <FieldReportScreen {...props} onSubmitDone={onSubmitDone} />;
  if (screen === "subs")   return <SubmissionsScreen {...props} />;
  if (screen === "owner")  return <OwnerScreen {...props} />;
  return <SuiteLauncher {...props} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
