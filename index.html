<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DBM Field App</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{--green:#6DD44E;--green-dark:#52b038;--gray:#999;--dark:#2E2E2E;--bg:#F2F2F2;--white:#fff;--red:#E53E3E;--amber:#D97706;--blue:#2563EB;--card:#fff;--border:#e0e0e0;--shadow:0 2px 8px rgba(0,0,0,0.08);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
  #root{min-height:100vh;}
  .screen{min-height:100vh;display:flex;flex-direction:column;}
  .header{background:var(--dark);color:white;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
  .header-logo{width:36px;height:36px;}
  .header-sub{font-size:11px;color:var(--gray);margin-top:1px;}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
  .lang-btn{background:rgba(255,255,255,0.12);border:none;color:white;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}
  .lang-btn.active{background:var(--green);}
  .content{flex:1;padding:16px;max-width:480px;margin:0 auto;width:100%;}
  .card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border);}
  .card-title{font-size:13px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
  .field select,.field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;background:white;color:var(--dark);appearance:none;-webkit-appearance:none;outline:none;}
  .field select:focus,.field input:focus{border-color:var(--green);}
  .select-wrap{position:relative;}.select-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--gray);pointer-events:none;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px;}
  .btn-green{background:var(--green);color:white;}.btn-green:active{transform:scale(0.98);}
  .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--dark);}
  .btn-sm{padding:8px 14px;font-size:13px;width:auto;border-radius:8px;}
  .btn-red{background:var(--red);color:white;}
  .btn-blue{background:var(--blue);color:white;}
  .pay-toggle{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
  .pay-toggle button{padding:11px;border:none;background:white;font-size:14px;font-weight:600;color:var(--gray);cursor:pointer;}
  .pay-toggle button.active{background:var(--green);color:white;}
  .pay-bar{background:var(--dark);color:white;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;z-index:50;}
  .scope-row{background:#FAFAFA;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #eee;}
  .scope-row-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .scope-label{font-size:13px;font-weight:700;}.scope-pay{font-size:14px;font-weight:700;color:var(--green);}
  .section-divider{height:1px;background:var(--border);margin:12px 0;}
  .add-btn{background:none;border:1.5px dashed var(--border);border-radius:9px;padding:11px;width:100%;color:var(--gray);font-size:13px;font-weight:600;cursor:pointer;}
  .remove-btn{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 4px;}
  .suite-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .suite-card{background:white;border-radius:14px;padding:20px 14px;text-align:center;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow);position:relative;transition:transform 0.1s;}
  .suite-card:active{transform:scale(0.97);}.suite-card.disabled{opacity:0.5;cursor:default;}
  .suite-icon{font-size:32px;margin-bottom:8px;}.suite-name{font-size:14px;font-weight:700;}.suite-sub{font-size:11px;color:var(--gray);margin-top:2px;}
  .suite-badge{position:absolute;top:8px;right:10px;background:var(--red);color:white;border-radius:99px;padding:2px 7px;font-size:11px;font-weight:700;}
  .coming-soon{font-size:10px;color:var(--amber);font-weight:600;margin-top:6px;}
  .status-pending{background:#FEF3C7;color:#92400E;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;}
  .status-approved{background:#D1FAE5;color:#065F46;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;}
  .status-disputed{background:#FEE2E2;color:#991B1B;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;}
  .status-paid{background:#DBEAFE;color:#1E40AF;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;}
  .status-sent,.status-opened{background:#E0E7FF;color:#3730A3;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;}
  .dispute-note{background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:10px 12px;font-size:13px;color:#92400E;margin-bottom:12px;}
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;}
  .info-row:last-child{border-bottom:none;}
  .info-label{font-size:13px;color:var(--gray);}.info-value{font-size:13px;font-weight:600;}
  .back-btn{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:0;line-height:1;margin-right:4px;}
  .loading{text-align:center;padding:40px;color:var(--gray);}.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .empty{text-align:center;padding:60px 20px;color:var(--gray);}.empty-icon{font-size:48px;margin-bottom:12px;}
  .stub-line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
  .stub-total{display:flex;justify-content:space-between;padding:12px 0 4px;font-size:16px;font-weight:800;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
  .modal-sheet{background:white;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px 16px 32px;}
  .modal-handle{width:40px;height:4px;background:#ddd;border-radius:99px;margin:0 auto 16px;}
  .modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}
  .mat-alert{border-radius:8px;padding:10px 12px;font-size:12px;font-weight:600;margin-top:8px;}
  .mat-alert-ok{background:#D1FAE5;color:#065F46;}.mat-alert-low{background:#FEF3C7;color:#92400E;}.mat-alert-short{background:#FEE2E2;color:#991B1B;}
  .foreman-note{margin-top:8px;padding:8px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;font-size:12px;color:#6B7280;}
  .role-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;}
  .role-owner{background:#DBEAFE;color:#1E40AF;}.role-finance{background:#FEF3C7;color:#92400E;}.role-foreman{background:#D1FAE5;color:#065F46;}.role-crew_lead{background:#E0E7FF;color:#3730A3;}
  .user-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0;}
  .user-row:last-child{border-bottom:none;}
  .login-screen{min-height:100vh;display:flex;flex-direction:column;background:var(--dark);}
  .login-card{background:white;border-radius:16px;padding:24px;margin:auto;width:100%;max-width:360px;}
  .login-logo{text-align:center;margin-bottom:24px;}
  .login-logo h2{color:var(--dark);font-size:20px;margin-top:12px;}
  .login-logo p{color:var(--gray);font-size:13px;margin-top:4px;}
  .pin-dots{display:flex;gap:12px;justify-content:center;margin:20px 0 8px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all 0.15s;}
  .pin-dot.filled{background:var(--green);border-color:var(--green);}
</style>
</head>
<body>

<script type="text/babel">
const {useState,useEffect,useMemo,useCallback} = React;

const API_BASE = "https://script.google.com/macros/s/AKfycbwmgEnpxc7lX-4V_dxC_2ChGwak7MaNIgM1vR1SjDmkdmOlrdjyUjY9VoAWLHCSwhILQQ/exec";

function DBMLogo(){return <img className="header-logo" alt="DBM" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAAXNSR0IArs4c6QAAA2lJREFUWEftl0tIVFEYx//nzp2ZO+OMOr7fj0zNMNJILCIiKAhq06JFi6BVtIiCIIhWbYKgRRQt2rRoUYseCEFBD4qiMjN7mJqO+Rp1nBnvnTt3buc7c0cnnVGnRdCC+eDOnHu+8/2/7/9952OQ5GOS+WOSAcj2zK0V6L8VF4xZNjSvM7h0nePqfAbPPQAZg4CtFPnLPJdoD3NxqW+3qWUQ0E/6pLXQlZhNkvIFBFuZ2w5y0amDyB5AemPqBhYU6r4KRgbSExMhkFcB6fQ9EkwJJUApfm/TH6TsMwYnWU/0SSmAHbROFpYJruCkRgfD0eMj8IQBCD3mKUNFocLk/jKZ7PJn0u/3cC5OxCMTIcT3wCy6QZxOx4i/JzfDN32+z3vfp5MRAqABSPvBQ4sF/F5VkKSv1tIjwWYtM7ddbEaR8OBiCIwOQKXON2J+QNQLQD+iuuKygq0LS/PIm94sRQIBfwDG/6LlIiQAoIBIJIh4OOeC7b7cCPqrT/LfJxUAuicuXtWr6RWjEUC0AdSHUCqiKyGPJsGIFkD8LJCYDBefgm9gPpQg+4CenBqH8sUPsG4h8+TP+iB2n5AGklGo9m9ZYVZkdZ2ZXm3eCvlmfb35KaOgDJEenQ6fP8vXnG3iFJlUKIAYq0r8C1XKSS4l9VptLe8NuWkBxCRAaH+MaHXt4dcVMd/FMHIK2CcWy5XWlR2VV+ctUmVOB/JdDeNbF1CwBJM2AcNFY1L3rIJ4F9CrADpC3AEsZ88WqrlKpqtc1fT2K0KXvSWiJACiw7S9srZF/2h2DXO4K0D5EehKkMU0/KeUaFVVn7j3E+VNA8gCiBmQNh6+DfL8gEuYvVdFUVLHVaLjfEk3oEwC6WtoB7C8X6qs7UhRnQ6J1pPo2UEeVxRA8rPRRsPDKx2dMT6ApxWHnKjqoiNdHdPjCQAkAaT3I+3NyPZCJGjSxahyGsKoq62tdWr2vYNR94vSIiA1P7t+5WNFcqmhcfkwOAv0jPR2DsC3yfSdUdN6/AcA0hmhRhSb1r9AaGTuSXqYbxc0V0T3pUaHBmfHE0KgHgeKB88uXiJdKS4bLdqS2lNqG96H3wjkP4G0AuBH0Dyb8sJjkkHAH9k7v8NIPkrkDsF/gB4mOSXoB/tRwAAAABJRU5ErkJggg=="/>;}

// ── STATIC DATA ──
const CREWS=["Alan Gonzalez","Alfonso Marrufo (Poncho)","Alonso Soto","Antonio Gaytan","Arturo","Chuy Arias","Edwin Aguilera Ramirez (Canelo)","Federico Rios","Felipe Flores (Texano)","German Torres","GJ Masonry (Jose Salazar)","GM Masonry Construction (Gerardo)","Gonzalo Najera Lopez","Jesus Morales","Jose Estrada","Murillo Masonry (Pechiyos)","Rosendo Flores","Ubaldo Flores (Belly)"];
const COMMERCIAL_SCOPES=["Brick","Stone - MJ/DS","Thin Brick/Stone","4\" CMU - Veneer","4\" CMU - Structural","6\" CMU","8\" CMU","10\" CMU","12\" CMU","Cast Stone"];
const RESIDENTIAL_SCOPES=["Brick","Stone - MJ","Stone - DS","Thin Brick/Stone","4\" CMU","6\" CMU","8\" CMU","10\" CMU","12\" CMU","Cast Stone","Footing","Stucco","Pavers","Flag Stone"];
const SF_SCOPES=new Set(["Stone - MJ/DS","Stone - MJ","Stone - DS","Thin Brick/Stone","Footing","Stucco","Pavers","Flag Stone"]);
const UNIT_RATES={"Commercial Brick":0.80,"Commercial Stone - MJ/DS":10,"Commercial Thin Brick/Stone":10,"Commercial 4\" CMU - Veneer":5,"Commercial 4\" CMU - Structural":7,"Commercial 6\" CMU":10,"Commercial 8\" CMU":10,"Commercial 10\" CMU":10,"Commercial 12\" CMU":12,"Commercial Cast Stone":10,"Residential Brick":0.35,"Residential Stone - MJ":6,"Residential Stone - DS":7,"Residential Thin Brick/Stone":8,"Residential 4\" CMU":4,"Residential 6\" CMU":4,"Residential 8\" CMU":5,"Residential 10\" CMU":5,"Residential 12\" CMU":6,"Residential Cast Stone":6,"Residential Footing":20,"Residential Stucco":8,"Residential Pavers":10,"Residential Flag Stone":7};
const MULTIPLIER_RATES={"None":1,"Highwork":1.5,"Professional Scaffold":1.1};
const DETAIL_TREE={"Arch":[{type:"Less 9ft",rate:200},{type:"9ft-15ft",rate:500},{type:"16ft Greater",rate:800}],"Brick Column":[{type:"Base/Small",rate:75},{type:"4x4",rate:100},{type:"Two Story",rate:200},{type:"Railcuts",rate:200}],"Column Caps":[{type:"Xtra Small",rate:2},{type:"1ft x 1ft",rate:5},{type:"2ft x 2ft",rate:25},{type:"Medium",rate:50},{type:"Large",rate:100}],"Fireplace":[{type:"Brick Hearth",rate:200},{type:"Brick Insert Fireplace (Up to Mantle)",rate:400},{type:"Brick Insert Fireplace (Single Story - Ceiling)",rate:600},{type:"Brick Insert Fireplace (Two Story - Ceiling)",rate:800},{type:"Brick Insert Fireplace (Large Base - Two Story - Ceiling)",rate:1000},{type:"Masonry (Brick/Stone) Fireplace w/ Chimney",rate:2500},{type:"Firebox",rate:500},{type:"Firebox w/ Flu Tiles",rate:1500},{type:"Isokern Firebox w/ Metal Pipe",rate:900},{type:"Isokern Firebox w/ Flu Tiles",rate:1500},{type:"Stone Mantle",rate:150},{type:"Slab on Hearth",rate:150}],"Fire Feature":[{type:"Fire Pit",rate:350},{type:"Fire Feature",rate:150}],"Mailbox":[{type:"Brick or Rock",rate:400},{type:"New Home Build",rate:250},{type:"1 Planter",rate:300},{type:"2 Planters",rate:350},{type:"w/ Demo",rate:1000}],"Tooth-In":[{type:"Window",rate:100},{type:"Door",rate:200}],"Infill":[{type:"Window/Door",rate:200}],"Door Install":[{type:"HM Doors Install & Grout",rate:400}],"Brick Design Detail":[{type:"Herringbone/Diamond (Less 25SF)",rate:300},{type:"Herringbone/Diamond (~25SF)",rate:500},{type:"Herringbone/Diamond (Entire Wall)",rate:800},{type:"Knockout w/o Gable",rate:500},{type:"Knockout w/ Gable",rate:800},{type:"Brick Corbel",rate:10},{type:"Wings (Gables)",rate:100},{type:"Rowlock",rate:2}],"Cast Stone Detail":[{type:"Header/Sill",rate:8},{type:"Radius",rate:10}],"Outdoor Kitchen":[{type:"Openings (1)",rate:400},{type:"Openings (3)",rate:600},{type:"Openings (4)",rate:800},{type:"Openings (5+)",rate:1200}],"Residential Highwork":[{type:"Some Highwork",rate:400},{type:"Average Highwork",rate:800},{type:"Heavy Highwork",rate:1000},{type:"Extra Highwork",rate:200}],"Demo":[{type:"Small",rate:150},{type:"Medium (mailbox size)",rate:500},{type:"Large",rate:1000},{type:"Extra Large",rate:null}],"Gas":[{type:"Gas",rate:75}]};
const CLEAN_TYPES=["Acid Wash ($150)","Acid Wash ($300)","Acid Wash ($500)","Acid Wash ($1000 Lg Comm.)","Clean ($150)","Clean ($300)","Clean ($500)","Clean ($1000 Lg Comm.)"];
const CLEAN_RATES_MAP={"Acid Wash ($150)":150,"Acid Wash ($300)":300,"Acid Wash ($500)":500,"Acid Wash ($1000 Lg Comm.)":1000,"Clean ($150)":150,"Clean ($300)":300,"Clean ($500)":500,"Clean ($1000 Lg Comm.)":1000};

// ── HELPERS ──
function getUnit(s){if(!s)return null;if(s==="Brick")return"Cubes";if(SF_SCOPES.has(s))return"SF";if(s==="Cast Stone")return"LF";return"EA";}
function getUnitLabel(s){const u=getUnit(s);if(u==="SF")return"Square Feet";if(u==="LF")return"Linear Feet";if(u==="Cubes")return"Remaining Cubes";return"Count (EA)";}
function calcScopePay(s,q,m,cat,bpc){if(!s||parseFloat(q)<=0||q==="")return 0;const r=UNIT_RATES[`${cat} ${s}`]||0;const u=getUnit(s);const pq=u==="Cubes"?(parseFloat(q)||0)*(parseFloat(bpc)||500):(parseFloat(q)||0);return pq*r*(MULTIPLIER_RATES[m]||1);}
function calcDetailPay(c,t,q){if(!c||!t)return 0;const it=(DETAIL_TREE[c]||[]).find(i=>i.type===t);if(!it||it.rate===null)return null;return it.rate*(parseInt(q)||1);}
function fmtDetailPay(c,t,q){const v=calcDetailPay(c,t,q);return v===null?"TBD":fmt(v);}
function calcCleanPay(c){return CLEAN_RATES_MAP[c]||0;}
function fmt(n){return"$"+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){if(!d)return"";const s=String(d).substring(0,10);const[y,m,dd]=s.split("-");return`${m}/${dd}/${y}`;}
function lastFriday(){const d=new Date();const dow=d.getDay();const back=dow>=5?dow-5:dow+2;d.setDate(d.getDate()-back);return d.toISOString().substring(0,10);}
function snapToFriday(val){const d=new Date(val+"T12:00:00");const dow=d.getDay();const diff=dow>=5?dow-5:dow+2;d.setDate(d.getDate()-diff);return d.toISOString().substring(0,10);}
function statusBadgeClass(s){const l=(s||"pending").toLowerCase();if(l==="approved")return"status-approved";if(l==="disputed")return"status-disputed";if(l==="paid")return"status-paid";if(l==="sent"||l==="opened")return"status-sent";return"status-pending";}
function fmtPhone(p){if(!p||p.length!==10)return p;return`(${p.slice(0,3)}) ${p.slice(3,6)}-${p.slice(6)}`;}

// ── API ──
async function apiGet(action,params={}){const qs=new URLSearchParams({action,...params}).toString();const r=await fetch(API_BASE+"?"+qs,{redirect:"follow"});const d=await r.json();if(!d.success)throw new Error(d.error);return d;}
async function apiPost(body){const r=await fetch(API_BASE,{method:"POST",redirect:"follow",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});const d=await r.json();if(!d.success)throw new Error(d.error);return d;}

// ═══════════════════════════════════════════════════════════════════════════════
// LOGIN SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
function LoginScreen({onLogin, onShowRegister}){
  const[phone,setPhone]=useState("");
  const[pin,setPin]=useState("");
  const[error,setError]=useState("");
  const[loading,setLoading]=useState(false);

  async function handleLogin(){
    if(phone.replace(/\D/g,"").length<10){setError("Enter a 10-digit phone number");return;}
    if(pin.length<4){setError("Enter your 4-digit PIN");return;}
    setLoading(true);setError("");
    try{
      const data=await apiPost({action:"login",phone:phone.replace(/\D/g,""),pin});
      onLogin(data.user);
    }catch(e){setError(e.message);}
    setLoading(false);
  }

  return(
    <div className="login-screen">
      <div style={{padding:"16px",textAlign:"center"}}>
        <div style={{fontSize:13,color:"var(--gray)"}}>Design Build Masonry</div>
      </div>
      <div className="login-card" style={{margin:"auto 16px"}}>
        <div className="login-logo">
          <div style={{fontSize:48}}>🧱</div>
          <h2>DBM Operations</h2>
          <p>Sign in with your phone number</p>
        </div>
        {error&&<div style={{background:"#FEE2E2",color:"#991B1B",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:14}}>{error}</div>}
        <div className="field">
          <label>Phone Number</label>
          <input type="tel" placeholder="(405) 555-1234" value={phone}
            onChange={e=>setPhone(e.target.value)} inputMode="tel"/>
        </div>
        <div className="field">
          <label>PIN</label>
          <input type="password" placeholder="4-digit PIN" maxLength={6} value={pin}
            onChange={e=>setPin(e.target.value.replace(/\D/g,""))} inputMode="numeric"
            onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
        </div>
        <div className="pin-dots">
          {[0,1,2,3].map(i=><div key={i} className={`pin-dot${pin.length>i?" filled":""}`}/>)}
        </div>
        <button className="btn btn-green" onClick={handleLogin} disabled={loading} style={{marginTop:12}}>
          {loading?"Signing in...":"Sign In"}
        </button>
        <div style={{textAlign:"center",marginTop:16}}>
          <span style={{fontSize:13,color:"var(--gray)"}}>No account? </span>
          <button onClick={onShowRegister} style={{background:"none",border:"none",color:"var(--green)",fontSize:13,fontWeight:700,cursor:"pointer"}}>Create Account</button>
        </div>
      </div>
      <div style={{height:80}}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// REGISTER SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
function RegisterScreen({onRegister, onShowLogin}){
  const[phone,setPhone]=useState("");
  const[name,setName]=useState("");
  const[crew,setCrew]=useState("");
  const[pin,setPin]=useState("");
  const[pin2,setPin2]=useState("");
  const[error,setError]=useState("");
  const[loading,setLoading]=useState(false);

  async function handleRegister(){
    if(phone.replace(/\D/g,"").length<10){setError("Enter a 10-digit phone number");return;}

          </select></div>
        </div>
        <div className="field-row">
          <div className="field"><label>Choose PIN</label><input type="password" placeholder="4+ digits" maxLength={6} value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,""))} inputMode="numeric"/></div>
          <div className="field"><label>Confirm PIN</label><input type="password" placeholder="Repeat" maxLength={6} value={pin2} onChange={e=>setPin2(e.target.value.replace(/\D/g,""))} inputMode="numeric"/></div>
        </div>
        <button className="btn btn-green" onClick={handleRegister} disabled={loading} style={{marginTop:8}}>
          {loading?"Creating...":"Create Account"}
        </button>
        <div style={{textAlign:"center",marginTop:16}}>
          <span style={{fontSize:13,color:"var(--gray)"}}>Already have an account? </span>
          <button onClick={onShowLogin} style={{background:"none",border:"none",color:"var(--green)",fontSize:13,fontWeight:700,cursor:"pointer"}}>Sign In</button>
        </div>
      </div>
      <div style={{height:80}}/>
    </div>
  );
}

// USER MANAGEMENT (owner only)
// ═══════════════════════════════════════════════════════════════════════════════
function UserManagementScreen({onNav,user}){
  const[users,setUsers]=useState([]);
  const[loading,setLoading]=useState(true);
  const[editUser,setEditUser]=useState(null);
  const[editRole,setEditRole]=useState("");
  const[editCrew,setEditCrew]=useState("");
  const[saving,setSaving]=useState(false);

  useEffect(()=>{
    apiGet("users").then(d=>setUsers(d.users||[])).catch(()=>{}).finally(()=>setLoading(false));
  },[]);

  async function saveRole(){
    setSaving(true);
    try{
      await apiPost({action:"updateRole",targetPhone:editUser.phone,newRole:editRole,newCrew:editCrew});
      const d=await apiGet("users");setUsers(d.users||[]);
      setEditUser(null);
    }catch(e){alert(e.message);}
    setSaving(false);
  }

  async function toggleActive(u){
    try{
      await apiPost({action:"updateRole",targetPhone:u.phone,active:!u.active});
      const d=await apiGet("users");setUsers(d.users||[]);
    }catch(e){alert(e.message);}
  }

  return(
    <div className="screen">
      <div className="header">
        <button className="back-btn" onClick={()=>onNav("screen","suite")}>←</button>
        <DBMLogo/>
        <div><div style={{fontSize:17,fontWeight:700,color:"white"}}>Manage Users</div><div className="header-sub">{users.length} users</div></div>
      </div>
      <div className="content">
        {loading?<div className="loading"><div className="spinner"/><p>Loading...</p></div>:
          users.map(u=>(
            <div key={u.phone} className="card" style={{opacity:u.active?1:0.5}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:15,fontWeight:700}}>{u.name}</div>
                  <div style={{fontSize:12,color:"var(--gray)"}}>{fmtPhone(u.phone)} · {u.crew||"No crew"}</div>
                  <div style={{marginTop:4}}><span className={`role-badge role-${u.role}`}>{u.role}</span></div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button className="btn btn-sm btn-outline" onClick={()=>{setEditUser(u);setEditRole(u.role);setEditCrew(u.crew);}}>Edit</button>
                  <button className="btn btn-sm" style={{background:u.active?"var(--red)":"var(--green)",color:"white",border:"none",cursor:"pointer"}}
                    onClick={()=>toggleActive(u)}>{u.active?"Disable":"Enable"}</button>
                </div>
              </div>
              <div style={{fontSize:11,color:"var(--gray)",marginTop:6}}>
                Created: {u.created||"—"} · Last login: {u.lastLogin||"Never"}
              </div>
            </div>
          ))
        }

        {/* Edit modal */}
        {editUser&&(
          <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditUser(null)}>
            <div className="modal-sheet">
              <div className="modal-handle"/>
              <div className="modal-title">Edit: {editUser.name}</div>
              <div className="field"><label>Role</label>
                <div className="select-wrap"><select value={editRole} onChange={e=>setEditRole(e.target.value)}>
                  <option value="owner">Owner</option>
                  <option value="finance">Finance</option>
                  <option value="foreman">Foreman</option>
                  <option value="crew_lead">Crew Lead</option>
                </select></div>
              </div>
              <div className="field"><label>Crew</label>
                <div className="select-wrap"><select value={editCrew} onChange={e=>setEditCrew(e.target.value)}>
                  <option value="">— None —</option>
                  {CREWS.map(c=><option key={c} value={c}>{c}</option>)}
                </select></div>
              </div>
              <button className="btn btn-green" onClick={saveRole} disabled={saving}>{saving?"Saving...":"Save Changes"}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

              </div>}
              {scopeA&&!isBrickA&&<div className="field-row" style={{marginTop:4}}><div className="field" style={{marginBottom:0}}><label>{getUnitLabel(scopeA)}</label><input type="number" inputMode="decimal" min="0" placeholder="0" value={qtyA} onChange={e=>setQtyA(e.target.value)}/></div></div>}
              {scopeA&&<div className="field" style={{marginTop:8,marginBottom:0}}><label>{t.multiplier}</label><div className="select-wrap"><select value={multA} onChange={e=>setMultA(e.target.value)}>{Object.keys(MULTIPLIER_RATES).map(m=><option key={m} value={m}>{m}</option>)}</select></div></div>}
            </div>
            {!showScopeB?<button className="add-btn" onClick={()=>setShowScopeB(true)}>{t.addScope}</button>:
            <div className="scope-row"><div className="scope-row-header"><span className="scope-label">{t.scopeB}</span><div style={{display:"flex",gap:8}}>{payB>0&&<span className="scope-pay">{fmt(payB)}</span>}<button className="remove-btn" onClick={()=>{setShowScopeB(false);setScopeB("");setQtyB("");}}>✕</button></div></div>
              <div className="field" style={{marginBottom:8}}><div className="select-wrap"><select value={scopeB} onChange={e=>setScopeB(e.target.value)}><option value="">— Scope —</option>{scopes.map(s=><option key={s} value={s}>{s}</option>)}</select></div></div>
              {scopeB&&scopeB!=="Brick"&&<div className="field-row"><div className="field" style={{marginBottom:0}}><label>{getUnitLabel(scopeB)}</label><input type="number" inputMode="decimal" min="0" placeholder="0" value={qtyB} onChange={e=>setQtyB(e.target.value)}/></div></div>}
              {scopeB&&<div className="field" style={{marginTop:8,marginBottom:0}}><label>{t.multiplier}</label><div className="select-wrap"><select value={multB} onChange={e=>setMultB(e.target.value)}>{Object.keys(MULTIPLIER_RATES).map(m=><option key={m} value={m}>{m}</option>)}</select></div></div>}
            </div>}
            <div className="section-divider"/><div className="card-title">{t.details}</div>
            {details.map((d,i)=><div key={i} className="scope-row"><div className="scope-row-header"><span className="scope-label">Detail {i+1}</span><div style={{display:"flex",gap:8}}>{d.cat&&d.type&&<span className="scope-pay">{fmtDetailPay(d.cat,d.type,d.qty)}</span>}<button className="remove-btn" onClick={()=>setDetails(details.filter((_,j)=>j!==i))}>✕</button></div></div>
              <div className="field" style={{marginBottom:8}}><div className="select-wrap"><select value={d.cat} onChange={e=>{const nd=[...details];nd[i]={...nd[i],cat:e.target.value,type:""};setDetails(nd);}}><option value="">— {t.detailCat} —</option>{Object.keys(DETAIL_TREE).map(c=><option key={c} value={c}>{c}</option>)}</select></div></div>
              {d.cat&&<div className="field-row"><div className="field" style={{marginBottom:0}}><div className="select-wrap"><select value={d.type} onChange={e=>{const nd=[...details];nd[i]={...nd[i],type:e.target.value};setDetails(nd);}}><option value="">— {t.detailType} —</option>{(DETAIL_TREE[d.cat]||[]).map(it=><option key={it.type} value={it.type}>{it.type}</option>)}</select></div></div><div className="field" style={{marginBottom:0}}><label>{t.count}</label><input type="number" inputMode="numeric" min="1" placeholder="1" value={d.qty} onChange={e=>{const nd=[...details];nd[i]={...nd[i],qty:e.target.value};setDetails(nd);}}/></div></div>}
            </div>)}
            <button className="add-btn" onClick={()=>setDetails([...details,{cat:"",type:"",qty:"1"}])}>{t.addDetail}</button>
            <div className="section-divider"/>
            <div className="field"><label>{t.cleanType}</label><div className="select-wrap"><select value={cleanType} onChange={e=>setCleanType(e.target.value)}><option value="">{t.none}</option>{CLEAN_TYPES.map(c=><option key={c} value={c}>{c}</option>)}</select></div></div>
          </>}
          {payType==="Hourly"&&<><div className="field"><label>{t.hoursWorked}</label><input type="number" inputMode="decimal" min="0" placeholder="0" value={hours} onChange={e=>setHours(e.target.value)}/></div><div className="field-row3"><div className="field"><label>{t.numLead}</label><input type="number" inputMode="numeric" min="0" value={numLead} onChange={e=>setNumLead(e.target.value)}/></div><div className="field"><label>{t.numMason}</label><input type="number" inputMode="numeric" min="0" value={numMason} onChange={e=>setNumMason(e.target.value)}/></div><div className="field"><label>{t.numLabor}</label><input type="number" inputMode="numeric" min="0" value={numLabor} onChange={e=>setNumLabor(e.target.value)}/></div></div></>}
        </div>
        <div className="card"><div className="card-title">{t.foremanNotes}</div><div className="field" style={{marginBottom:0}}><textarea style={{width:"100%",padding:"11px 14px",border:"1.5px solid var(--border)",borderRadius:9,fontSize:14,fontFamily:"inherit",resize:"vertical",minHeight:60}} value={foremanNotes} onChange={e=>setForemanNotes(e.target.value)} placeholder="Any notes..."/></div></div>
        <button className="btn btn-green" onClick={handleSubmit} disabled={submitting} style={{marginBottom:16}}>{submitting?t.submitting:t.submit}</button>
      </div>
      {payType==="Unit"&&<div className="pay-bar"><div style={{fontSize:13,color:"var(--gray)"}}>{t.estPay}</div><div style={{fontSize:22,fontWeight:800,color:"var(--green)"}}>{fmt(totalPay)}</div></div>}
      {showNewProject&&<NewProjectModal lang={lang} onClose={()=>setShowNewProject(false)} onCreated={(n,c)=>{setShowNewProject(false);apiGet("projects").then(d=>{setProjects(d.projects||[]);setProject(n);setCategory(c);}).catch(()=>{});}}/>}
    </div>
  );
}

function NewProjectModal({onClose,onCreated,lang}){
  const[name,setName]=useState("");const[category,setCategory]=useState("Commercial");const[contractor,setContractor]=useState("");
  const[bpc1,setBpc1]=useState("500");const[initCubes1,setInitCubes1]=useState("");const[brickDesc1,setBrickDesc1]=useState("");
  const[showType2,setShowType2]=useState(false);const[bpc2,setBpc2]=useState("500");const[initCubes2,setInitCubes2]=useState("");const[brickDesc2,setBrickDesc2]=useState("");
  const[saving,setSaving]=useState(false);const[error,setError]=useState("");
  async function save(){if(!name.trim()){setError("Name required");return;}setSaving(true);setError("");
    try{await apiPost({action:"addProject",name:name.trim(),category,contractor:contractor.trim(),bpc1:parseInt(bpc1)||500,initialCubes1:parseInt(initCubes1)||0,brickDesc1:brickDesc1.trim(),bpc2:showType2?(parseInt(bpc2)||0):0,initialCubes2:showType2?(parseInt(initCubes2)||0):0,brickDesc2:showType2?brickDesc2.trim():""});onCreated(name.trim(),category);}catch(e){setError(e.message);}setSaving(false);}
  return(<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal-sheet"><div className="modal-handle"/><div className="modal-title">Create Project</div>
    {error&&<div style={{color:"var(--red)",fontSize:13,marginBottom:12}}>{error}</div>}
    <div className="field"><label>Project Name *</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. 6800 Cove Creek"/></div>
    <div className="field-row"><div className="field"><label>Category</label><div className="select-wrap"><select value={category} onChange={e=>setCategory(e.target.value)}><option value="Commercial">Commercial</option><option value="Residential">Residential</option></select></div></div><div className="field"><label>Contractor</label><input value={contractor} onChange={e=>setContractor(e.target.value)} placeholder="Builder"/></div></div>
    <div className="card" style={{background:"#FAFAFA",marginTop:8}}><div className="card-title">Type 1 (Primary)</div><div className="field"><label>Brick Description</label><input value={brickDesc1} onChange={e=>setBrickDesc1(e.target.value)} placeholder="e.g. Golden Sunset"/></div><div className="field-row"><div className="field" style={{marginBottom:0}}><label>BPC</label><input type="number" value={bpc1} onChange={e=>setBpc1(e.target.value)}/></div><div className="field" style={{marginBottom:0}}><label>Initial Cubes</label><input type="number" value={initCubes1} onChange={e=>setInitCubes1(e.target.value)}/></div></div></div>
    {!showType2?<button className="add-btn" style={{marginTop:10}} onClick={()=>setShowType2(true)}>+ Add Type 2</button>:
    <div className="card" style={{background:"#FAFAFA",marginTop:10}}><div style={{display:"flex",justifyContent:"space-between"}}><div className="card-title" style={{marginBottom:0}}>Type 2</div><button className="remove-btn" onClick={()=>setShowType2(false)}>✕</button></div><div className="field" style={{marginTop:10}}><label>Brick Description</label><input value={brickDesc2} onChange={e=>setBrickDesc2(e.target.value)}/></div><div className="field-row"><div className="field" style={{marginBottom:0}}><label>BPC</label><input type="number" value={bpc2} onChange={e=>setBpc2(e.target.value)}/></div><div className="field" style={{marginBottom:0}}><label>Initial Cubes</label><input type="number" value={initCubes2} onChange={e=>setInitCubes2(e.target.value)}/></div></div></div>}
    <button className="btn btn-green" style={{marginTop:16}} onClick={save} disabled={saving}>{saving?"Creating...":"Create Project"}</button>
  </div></div>);
}

// ═══════════════════════════════════════════════════════════════════════════════
// SUBMISSIONS SCREEN (role-filtered)
// ═══════════════════════════════════════════════════════════════════════════════
function SubmissionsScreen({onNav,lang,user}){
  const[subs,setSubs]=useState([]);const[loading,setLoading]=useState(true);const[viewStub,setViewStub]=useState(null);
  const[filterCrew,setFilterCrew]=useState(user.role==="foreman"?user.crew:"");const[filterWeek,setFilterWeek]=useState("");
  useEffect(()=>{
    const params=user.role==="foreman"?{crew:user.crew}:{};
    apiGet("submissions",params).then(d=>setSubs(d.submissions||[])).catch(()=>setSubs([])).finally(()=>setLoading(false));
  },[user]);
  const weekOpts=[...new Set(subs.map(s=>s.weekEnding).filter(Boolean))].sort().reverse();
  const filtered=subs.filter(s=>{if(filterCrew&&s.crewDisplay!==filterCrew)return false;if(filterWeek&&s.weekEnding!==filterWeek)return false;return true;});
  if(viewStub){const s=viewStub;return(<div className="screen"><div className="header"><button className="back-btn" onClick={()=>setViewStub(null)}>←</button><div style={{fontSize:17,fontWeight:700,color:"white"}}>Pay Breakdown</div></div><div className="content">
    <div className="card"><div className="info-row"><span className="info-label">Project</span><span className="info-value">{s.projectDisplay}</span></div><div className="info-row"><span className="info-label">Crew</span><span className="info-value">{s.crewDisplay}</span></div><div className="info-row"><span className="info-label">Week</span><span className="info-value">{fmtDate(s.weekEnding)}</span></div><div className="info-row"><span className="info-label">Status</span><span className={statusBadgeClass(s.stubStatus)}>{(s.stubStatus||"pending").toUpperCase()}</span></div></div>
    {s.ownerNote&&<div className="dispute-note">⚠️ {s.ownerNote}</div>}
    <div className="card"><div className="card-title">Pay Breakdown</div>{s.scopeA&&<div className="stub-line"><span>Scope A: {s.scopeA}</span><span>{fmt(s.payA||0)}</span></div>}{s.scopeB&&<div className="stub-line"><span>Scope B: {s.scopeB}</span><span>{fmt(s.payB||0)}</span></div>}{s.cleanType&&<div className="stub-line"><span>{s.cleanType}</span><span>{fmt(s.cleanPay||0)}</span></div>}<div className="section-divider"/><div className="stub-total"><span>Total</span><span style={{color:"var(--green)"}}>{fmt(s.totalPay||0)}</span></div></div>
  </div></div>);}
  return(<div className="screen"><div className="header"><button className="back-btn" onClick={()=>onNav("screen","suite")}>←</button><DBMLogo/><div><div style={{fontSize:17,fontWeight:700,color:"white"}}>Submissions</div><div className="header-sub">DBM Operations</div></div></div><div className="content">
    <div className="card" style={{marginBottom:12}}><div className="card-title">Filter</div>
      {user.role!=="foreman"&&<div className="field" style={{marginBottom:10}}><label>Crew</label><div className="select-wrap"><select value={filterCrew} onChange={e=>setFilterCrew(e.target.value)}><option value="">— All —</option>{CREWS.map(c=><option key={c} value={c}>{c}</option>)}</select></div></div>}
      <div className="field" style={{marginBottom:0}}><label>Week</label><div className="select-wrap"><select value={filterWeek} onChange={e=>setFilterWeek(e.target.value)}><option value="">— All —</option>{weekOpts.map(w=><option key={w} value={w}>{fmtDate(w)}</option>)}</select></div></div>
    </div>
    {loading?<div className="loading"><div className="spinner"/></div>:filtered.length===0?<div className="empty"><div className="empty-icon">📭</div><p>No submissions</p></div>:
    filtered.map(s=><div key={s.id} className="card" onClick={()=>setViewStub(s)} style={{cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:14,fontWeight:700}}>{s.projectDisplay}</div><div style={{fontSize:12,color:"var(--gray)"}}>{s.crewDisplay} · {fmtDate(s.weekEnding)}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:700,color:"var(--green)"}}>{fmt(s.totalPay)}</div><span className={statusBadgeClass(s.stubStatus)}>{(s.stubStatus||"pending").toUpperCase()}</span></div></div></div>)}
  </div></div>);
}

// ═══════════════════════════════════════════════════════════════════════════════
// OWNER DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function OwnerScreen({onNav,user}){
  const[subs,setSubs]=useState([]);const[loading,setLoading]=useState(true);const[filterStatus,setFilterStatus]=useState("");
  const[activeAction,setActiveAction]=useState(null);const[ownerNote,setOwnerNote]=useState("");const[actionLoading,setActionLoading]=useState(false);
  useEffect(()=>{apiGet("submissions").then(d=>setSubs(d.submissions||[])).catch(()=>setSubs([])).finally(()=>setLoading(false));},[]);
  const filtered=filterStatus?subs.filter(s=>(s.stubStatus||"pending").toLowerCase()===filterStatus):subs;
  const counts={pending:subs.filter(s=>(s.stubStatus||"pending").toLowerCase()==="pending").length,approved:subs.filter(s=>(s.stubStatus||"").toLowerCase()==="approved").length,disputed:subs.filter(s=>(s.stubStatus||"").toLowerCase()==="disputed").length};
  async function handleTransition(sub,newStatus){setActionLoading(true);try{await apiPost({action:"transition",crewDisplay:sub.crewDisplay,weekEnding:sub.weekEnding,newStatus,ownerNote:ownerNote.trim(),actorPhone:user.phone,actorName:user.name});const d=await apiGet("submissions");setSubs(d.submissions||[]);setActiveAction(null);setOwnerNote("");}catch(e){alert(e.message);}setActionLoading(false);}
  return(<div className="screen"><div className="header"><button className="back-btn" onClick={()=>onNav("screen","suite")}>←</button><DBMLogo/><div><div style={{fontSize:17,fontWeight:700,color:"white"}}>Owner Dashboard</div><div className="header-sub">Approve & Pay</div></div></div><div className="content">
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>{[{l:"All",v:"",c:subs.length},{l:"Pending",v:"pending",c:counts.pending},{l:"Approved",v:"approved",c:counts.approved},{l:"Disputed",v:"disputed",c:counts.disputed}].map(f=><button key={f.v} style={{borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:600,border:filterStatus===f.v?"none":"1.5px solid var(--border)",background:filterStatus===f.v?"var(--green)":"white",color:filterStatus===f.v?"white":"var(--dark)",cursor:"pointer"}} onClick={()=>setFilterStatus(f.v)}>{f.l} ({f.c})</button>)}</div>
    {loading?<div className="loading"><div className="spinner"/></div>:filtered.length===0?<div className="empty"><div className="empty-icon">📋</div><p>None found</p></div>:
    filtered.map(s=><div key={s.id} className="card"><div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:14,fontWeight:700}}>{s.crewDisplay}</div><div style={{fontSize:12,color:"var(--gray)"}}>{s.projectDisplay} · {fmtDate(s.weekEnding)}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:700,color:"var(--green)"}}>{fmt(s.totalPay)}</div><span className={statusBadgeClass(s.stubStatus)}>{(s.stubStatus||"pending").toUpperCase()}</span></div></div>
      {s.ownerNote&&<div className="dispute-note" style={{marginTop:8}}>⚠️ {s.ownerNote}</div>}
      {activeAction===s.id?<div style={{marginTop:10}}><div className="field" style={{marginBottom:8}}><label>Note</label><input value={ownerNote} onChange={e=>setOwnerNote(e.target.value)} placeholder="Reason..."/></div><div style={{display:"flex",gap:8}}><button className="btn btn-sm btn-green" disabled={actionLoading} onClick={()=>handleTransition(s,"APPROVED")}>✓ Approve</button><button className="btn btn-sm btn-red" disabled={actionLoading} onClick={()=>handleTransition(s,"DISPUTED")}>✕ Dispute</button><button className="btn btn-sm btn-outline" onClick={()=>{setActiveAction(null);setOwnerNote("");}}>Cancel</button></div></div>:
      <div style={{marginTop:10,display:"flex",gap:8}}><button className="btn btn-sm btn-outline" onClick={()=>setActiveAction(s.id)}>Review</button>{(s.stubStatus||"").toLowerCase()==="approved"&&<button className="btn btn-sm btn-blue" onClick={()=>handleTransition(s,"PAID")}>💰 Paid</button>}</div>}
    </div>)}
  </div></div>);
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP ROOT (with auth gate)
// ═══════════════════════════════════════════════════════════════════════════════
function App(){
  const[user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem("dbm_user"));}catch(e){return null;}});
  const[authView,setAuthView]=useState("login");
  const[screen,setScreen]=useState("suite");
  const[lang,setLang]=useState("en");
  const[submissions,setSubmissions]=useState([]);

  // Validate stored user on mount
  useEffect(()=>{
    if(user&&user.phone){
      apiGet("getUser",{phone:user.phone}).then(d=>{
        if(d.user&&d.user.active){setUser(d.user);localStorage.setItem("dbm_user",JSON.stringify(d.user));}
        else{setUser(null);localStorage.removeItem("dbm_user");}
      }).catch(()=>{});
    }
  },[]);

  useEffect(()=>{if(user)apiGet("submissions").then(d=>setSubmissions(d.submissions||[])).catch(()=>{});},[user]);

  function handleLogin(u){setUser(u);localStorage.setItem("dbm_user",JSON.stringify(u));setScreen("suite");}
  function handleLogout(){setUser(null);localStorage.removeItem("dbm_user");setScreen("suite");setAuthView("login");}
  function onSubmitDone(){apiGet("submissions").then(d=>setSubmissions(d.submissions||[])).catch(()=>{});}

  function onNav(type,val){
    if(type==="screen"){setScreen(val);if(val==="suite")apiGet("submissions").then(d=>setSubmissions(d.submissions||[])).catch(()=>{});}
    if(type==="lang")setLang(val);
    if(type==="logout")handleLogout();
  }

  // AUTH GATE
  if(!user){
    if(authView==="register")return<RegisterScreen onRegister={handleLogin} onShowLogin={()=>setAuthView("login")}/>;
    return<LoginScreen onLogin={handleLogin} onShowRegister={()=>setAuthView("register")}/>;
  }

  const props={onNav,lang,user,submissions};
  if(screen==="suite")  return<SuiteLauncher{...props}/>;
  if(screen==="field")  return<FieldReportScreen{...props}onSubmitDone={onSubmitDone}/>;
  if(screen==="subs")   return<SubmissionsScreen{...props}/>;
  if(screen==="owner")  return<OwnerScreen{...props}/>;
  if(screen==="users")  return<UserManagementScreen{...props}/>;
  if(screen==="myPay")  return<MyPaycheckScreen{...props}/>;
  return<SuiteLauncher{...props}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
